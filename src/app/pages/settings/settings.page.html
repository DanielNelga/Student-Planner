<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Settings</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-toggle [(ngModel)]="notifications">
          Notifications
        </ion-toggle>
      </ion-item>

      <ion-button expand="block" class="ion-margin-top" (click)="testNotification()">
        Test Notification
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
